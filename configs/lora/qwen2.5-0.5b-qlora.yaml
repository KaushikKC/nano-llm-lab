model_name: Qwen/Qwen2.5-0.5B
# LoRA adapter (same rank as LoRA run for fair comparison)
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
bias: none
# 4-bit quantization (QLoRA)
bnb_4bit_quant_type: nf4       # NormalFloat4 — preserves outlier weights better than int4
bnb_4bit_use_double_quant: true # quantize the per-block quantization constants (~0.4 bits/param extra)
bnb_4bit_compute_dtype: float16 # dequantize to fp16 for the forward/backward compute
# Data
max_seq_len: 512
data_dir: data/sft
# Training
out_dir: checkpoints/qlora
run_name: qlora_qwen0.5b
micro_batch_size: 2
grad_accum_steps: 8
epochs: 10
lr: 2.0e-4
min_lr: 2.0e-5
warmup_steps: 10
weight_decay: 0.0
grad_clip: 1.0
log_interval: 5
seed: 1337
device: auto
dtype: bfloat16   # dtype for LoRA adapter weights; base stays 4-bit
wandb: false
