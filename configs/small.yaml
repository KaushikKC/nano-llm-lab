# Small config (~14M params) — the main Stage 1 result. Trained on a token
# budget (not a full epoch) chosen to fit a single-GPU/MPS run in hours.
# Effective tokens/step = micro_batch_size * grad_accum_steps * max_seq_len
#                        = 16 * 4 * 256 = 16,384
# max_steps=8000 -> ~131M tokens.

model:
  vocab_size: 8192
  n_layer: 6
  n_head: 6
  d_model: 384
  d_ff: 1024
  max_seq_len: 256
  rope_base: 10000.0
  dropout: 0.0

train:
  data_dir: data/processed
  out_dir: checkpoints/small
  run_name: small

  micro_batch_size: 16
  grad_accum_steps: 4
  max_steps: 8000

  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 300
  weight_decay: 0.1
  grad_clip: 1.0

  eval_interval: 250
  eval_iters: 50
  log_interval: 10
  ckpt_interval: 1000

  seed: 1337
  device: auto
  amp: false
  compile: false
  wandb: false
